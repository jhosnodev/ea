</script>

<style>
  /* Night sky atmosphere (identical to index) */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 80% 0%, rgba(53,115,118,0.18), transparent 60%),

      linear-gradient(180deg, #23141D 0%, #1E1820 50%, #1A0F16 100%);
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.55;
    background-image:
      radial-gradient(1px 1px at 12% 18%, #E6FCFA 100%, transparent),
      radial-gradient(1px 1px at 22% 62%, #E6FCFA 100%, transparent),
      radial-gradient(1.5px 1.5px at 38% 8%, #F2EBD3 100%, transparent),
      radial-gradient(1px 1px at 47% 84%, #E6FCFA 100%, transparent),
      radial-gradient(1px 1px at 58% 24%, #E6FCFA 100%, transparent),

      radial-gradient(1px 1px at 81% 12%, #E6FCFA 100%, transparent),

      radial-gradient(1px 1px at 64% 92%, #E6FCFA 100%, transparent);
    animation: twinkle 8s ease-in-out infinite alternate;

  @keyframes twinkle {

    50%  { opacity: 0.65; }

  ::selection { background: #357376; color: #E6FCFA; }

  /* Moon orb */
  .orbit {
    position: fixed; top: 14%; right: 8%;
    width: clamp(110px, 14vw, 200px);
    height: clamp(110px, 14vw, 200px);
    z-index: 1; pointer-events: none;
    opacity: 0; transform: translate3d(0, 0, 0);
    will-change: transform, opacity;
    animation: orbit-rise 2.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    --phase: -110%;
  }
  .orbit__moon {
    position: relative; width: 100%; height: 100%;
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 0 50px rgba(138, 149, 201, 0.15), 0 0 100px rgba(89, 101, 160, 0.08);
    mix-blend-mode: screen; opacity: 0.78;
  }
  .orbit__svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; filter: blur(0.4px); }
  .orbit__shadow {
    position: absolute; inset: -2%; border-radius: 50%;
    background: radial-gradient(circle at center, #000 55%, rgba(0,0,0,0.78) 78%, rgba(0,0,0,0.0) 100%);
    transform: translate3d(var(--phase, -110%), 0, 0); will-change: transform;
    filter: blur(4.5px);
  }
  @keyframes orbit-rise {
    from { transform: translate3d(0, 40px, 0) scale(0.9); opacity: 0; }
    to   { transform: translate3d(0, 0, 0)    scale(1);   opacity: 1; }
  }
  @media (max-width: 759px) {
    .orbit { width: 78px; height: 78px; top: 5.5rem; right: 1rem; }
    .orbit__moon { opacity: 0.55; }
  }
  @media (max-width: 379px) {
    .orbit { width: 65px; height: 65px; top: 5rem; right: 0.85rem; }
  }

  /* Reusable rise animation */
  .rise {
    opacity: 0;
    animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .rise-1 { animation-delay: 0.1s; }
  .rise-2 { animation-delay: 0.3s; }
  .rise-3 { animation-delay: 0.55s; }
  .rise-4 { animation-delay: 0.8s; }
  .rise-5 { animation-delay: 1.05s; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Editorial gradient emphasis (same as index hero) */
  .gradient-text-em {
    background: linear-gradient(135deg, #F2EBD3 0%, #E6FCFA 50%, #357376 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    body::after, .orbit, .marquee-track, .title-star::after, .pulse-dot { animation: none !important; }
    .rise { opacity: 1; }
    .orbit { opacity: 1; }
  }

  /* Cursor custom */
  @media (hover: hover) and (pointer: fine) { body, body * { cursor: none !important; } input, textarea { cursor: text !important; } }
  .cursor-dot, .cursor-ring { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; will-change: transform; opacity: 0; }
  .cursor-dot.is-active, .cursor-ring.is-active { opacity: 1; }
  .cursor-dot { width: 6px; height: 6px; background: #E6FCFA; border-radius: 50%; transform: translate3d(-50%, -50%, 0); transition: opacity 0.3s ease, transform 0.15s ease, background 0.25s ease, width 0.25s ease, height 0.25s ease; box-shadow: 0 0 8px rgba(230, 252, 250, 0.4); }
  .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(53, 115, 118, 0.55); border-radius: 50%; background: rgba(53, 115, 118, 0.04); transform: translate3d(-50%, -50%, 0); transition: opacity 0.3s ease, width 0.35s cubic-bezier(0.16, 1, 0.3, 1), height 0.35s cubic-bezier(0.16, 1, 0.3, 1), background 0.35s ease, border-color 0.35s ease; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
  .cursor-ring.is-hovering { width: 56px; height: 56px; background: rgba(53, 115, 118, 0.18); border-color: rgba(91, 217, 168, 0.7); }
  .cursor-dot.is-hovering { width: 4px; height: 4px; background: #5BD9A8; }
  .cursor-ring.is-clicking { width: 24px; height: 24px; background: rgba(91, 217, 168, 0.25); }
  @media (hover: none), (pointer: coarse), (max-width: 759px) { .cursor-dot, .cursor-ring { display: none; } }

  :focus-visible {
    outline: 2px solid #357376;
    outline-offset: 3px;
    border-radius: 2px;
  }
</style>
</head>

<script>
  // ═══════════════════════════════════════════════════════════════════════════════
  // CURSOR CUSTOM — dot + orbital ring with delay
  // ═══════════════════════════════════════════════════════════════════════════════
  (function() {
    const cursorDot = document.querySelector('.cursor-dot');
    const cursorRing = document.querySelector('.cursor-ring');
    if (!cursorDot || !cursorRing) return;
    
    const links = document.querySelectorAll('a, button, input, textarea, [role="button"]');
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    
    let dotX = 0, dotY = 0, ringX = 0, ringY = 0;
    let targetX = 0, targetY = 0;
    let mouseX = 0, mouseY = 0;
    let isHovering = false, isClicking = false;
    
    if (prefersReducedMotion) {
      cursorDot.classList.add('is-active');
      cursorRing.classList.add('is-active');
      return;
    }
    
    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      targetX = mouseX;
      targetY = mouseY;
      cursorDot.classList.add('is-active');
      cursorRing.classList.add('is-active');
    });
    
    document.addEventListener('mousedown', () => { isClicking = true; cursorRing.classList.add('is-clicking'); cursorDot.classList.add('is-hovering'); });
    document.addEventListener('mouseup', () => { isClicking = false; cursorRing.classList.remove('is-clicking'); cursorDot.classList.remove('is-hovering'); });
    
    links.forEach(link => {
      link.addEventListener('mouseenter', () => { isHovering = true; cursorRing.classList.add('is-hovering'); cursorDot.classList.add('is-hovering'); });
      link.addEventListener('mouseleave', () => { isHovering = false; cursorRing.classList.remove('is-hovering'); cursorDot.classList.remove('is-hovering'); });
    });
    
    function animate() {
      const dt = 0.14;
      const dr = 0.1;
      dotX += (targetX - dotX) * dt;
      dotY += (targetY - dotY) * dt;
      ringX += (mouseX - ringX) * dr;
      ringY += (mouseY - ringY) * dr;
      
      cursorDot.style.transform = `translate3d(${dotX}px, ${dotY}px, 0)`;
      cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0)`;
      requestAnimationFrame(animate);
    }
    animate();
  })();

  // ═══════════════════════════════════════════════════════════════════════════════
  // ORBIT SHADOW — lunar phases on scroll
  // ═══════════════════════════════════════════════════════════════════════════════
  (function() {
    const orbit = document.querySelector('.orbit');
    const orbitShadow = document.querySelector('.orbit__shadow');
    if (!orbitShadow) return;
    
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reducedMotion) return;
    
    let ticking = false;
    function updateScrollFx() {
      const y = window.scrollY;
      const docH = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      const progress = Math.min(Math.max(y / docH, 0), 1);
      
      const phase = -110 + (progress * 220);
      orbitShadow.style.transform = 'translate3d(' + phase.toFixed(2) + '%, 0, 0)';
      
      if (orbit) {
        const parallaxY = y * 0.10;
        const fadeStart = 0.85;
        const fadeAlpha = progress > fadeStart ? Math.max(0, 1 - ((progress - fadeStart) / (1 - fadeStart))) : 1;
        orbit.style.transform = 'translate3d(0, ' + parallaxY.toFixed(2) + 'px, 0)';
        orbit.style.opacity = fadeAlpha.toFixed(3);
      }
      
      ticking = false;
    }
    
    window.addEventListener('scroll', () => {
      if (!ticking) { requestAnimationFrame(updateScrollFx); ticking = true; }
    }, { passive: true });
  })();
</script>
