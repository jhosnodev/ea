bio:  "¿Ratón de biblioteca? Es posible, tanto así que he vivido gran parte de mi vida con un libro debajo del brazo. Entonces quise hacer de la literatura mi vida y estudié letras en la Universidad Católica Andrés Bello. Luego de eso me encontré, de un golpe inesperado, con el marketing, entonces uní mi amor por escribir, con el amor por la tecnología y la comunicación, y me convertí en mi yo de ahora: Redactora de contenido, community manager, escritora por las noches y lectora ávida.
He escrito de todo un poco, desde
tecnología, hasta medicina y psicología infantil. Asimismo, me gusta investigar, estudiar el tema que estoy
trabajando y escribir con la mayor fidelidad posible, es decir, siempre hago un estudio de vocabulario o
terminología antes de realizar el trabajo."

