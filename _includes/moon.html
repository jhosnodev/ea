<!-- MOON ORBIT -->
<div class="orbit" aria-hidden="true">
  <div class="orbit__moon">
    <svg class="orbit__svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false">
      <defs>
        <radialGradient id="moonBody" cx="32%" cy="28%" r="92%">
          <stop offset="0%"   stop-color="#E0E7F5"/>
          <stop offset="18%"  stop-color="#BAC4DE"/>
          <stop offset="42%"  stop-color="#8995BD"/>
          <stop offset="68%"  stop-color="#4F5990"/>
          <stop offset="88%"  stop-color="#2A3266"/>
          <stop offset="100%" stop-color="#161D40"/>
        </radialGradient>
        <radialGradient id="craterShade" cx="68%" cy="72%" r="65%">
          <stop offset="0%"   stop-color="#0F1530" stop-opacity="0.85"/>
          <stop offset="40%"  stop-color="#1A2247" stop-opacity="0.55"/>
          <stop offset="80%"  stop-color="#1A2247" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#1A2247" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="craterRim" cx="32%" cy="28%" r="70%">
          <stop offset="0%"   stop-color="#C4CEED" stop-opacity="0.4"/>
          <stop offset="35%"  stop-color="#9DA8D4" stop-opacity="0.18"/>
          <stop offset="80%"  stop-color="#9DA8D4" stop-opacity="0"/>
        </radialGradient>
        <symbol id="crater" viewBox="-10 -10 20 20" overflow="visible">
          <circle cx="0.5" cy="0.7" r="9" fill="url(#craterShade)"/>
          <circle cx="-0.8" cy="-1" r="8.5" fill="url(#craterRim)"/>
        </symbol>
        <filter id="brushPaper" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.022 0.045" numOctaves="3" seed="11"/>
          <feColorMatrix values="0.45 0 0 0 0.06 0 0.45 0 0.07 0 0 0.45 0 0.12 0 0 0 0.55 0"/>
          <feComposite in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="paperFine" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="1.3" numOctaves="2" stitchTiles="stitch" seed="3"/>
          <feColorMatrix values="0 0 0 0 0.10 0 0 0 0 0.13 0 0 0 0 0.28 0 0 0 0.4 0"/>
          <feComposite in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="paintWobble" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="7" result="t"/>
          <feDisplacementMap in="SourceGraphic" in2="t" scale="2.2"/>
        </filter>
        <filter id="softenAll" x="-5%" y="-5%" width="110%" height="110%">
          <feGaussianBlur stdDeviation="0.5"/>
        </filter>
        <radialGradient id="vintagePatina" cx="50%" cy="48%" r="62%">
          <stop offset="0%"   stop-color="rgba(220,195,160,0)"/>
          <stop offset="65%"  stop-color="rgba(200,170,135,0.05)"/>
          <stop offset="100%" stop-color="rgba(170,135,95,0.20)"/>
        </radialGradient>
        <radialGradient id="terminator" cx="60%" cy="65%" r="80%">
          <stop offset="0%"   stop-color="rgba(10,8,22,0)"/>
          <stop offset="55%"  stop-color="rgba(10,8,22,0)"/>
          <stop offset="88%"  stop-color="rgba(10,8,22,0.45)"/>
          <stop offset="100%" stop-color="rgba(10,8,22,0.7)"/>
        </radialGradient>
        <clipPath id="moonClip"><circle cx="100" cy="100" r="98"/></clipPath>
      </defs>
      <g clip-path="url(#moonClip)">
        <circle cx="100" cy="100" r="100" fill="url(#moonBody)"/>
        <g filter="url(#paintWobble)">
          <ellipse cx="58"  cy="128" rx="34" ry="28" fill="#1A2245" filter="url(#softenAll)" opacity="0.62"/>
          <ellipse cx="78"  cy="115" rx="14" ry="12" fill="#1A2245" filter="url(#softenAll)" opacity="0.4"/>
        </g>
        <g filter="url(#paintWobble)" opacity="0.55">
          <ellipse cx="138" cy="55"  rx="22" ry="18" fill="#A2ADD5" filter="url(#softenAll)" opacity="0.45"/>
          <ellipse cx="50"  cy="55"  rx="22" ry="17" fill="#B0BAD8" filter="url(#softenAll)" opacity="0.4"/>
          <ellipse cx="128" cy="140" rx="20" ry="16" fill="#1F2750" filter="url(#softenAll)" opacity="0.55"/>
        </g>
        <ellipse cx="48" cy="62" rx="20" ry="18" fill="rgba(220,228,245,0.07)" filter="url(#softenAll)"/>
        <g filter="url(#paintWobble)">
          <use href="#crater" x="38" y="52" width="22" height="20" opacity="0.92"/>
        </g>
        <g filter="url(#paintWobble)">
          <use href="#crater" x="118" y="42" width="17" height="15" opacity="0.85"/>
          <use href="#crater" x="138" y="38" width="11" height="10" opacity="0.7"/>
          <use href="#crater" x="153" y="52" width="9"  height="8"  opacity="0.65"/>
          <use href="#crater" x="132" y="60" width="8"  height="9"  opacity="0.65"/>
          <use href="#crater" x="115" y="68" width="13" height="12" opacity="0.78"/>
          <use href="#crater" x="158" y="68" width="6"  height="6"  opacity="0.55"/>
          <use href="#crater" x="148" y="80" width="7"  height="6"  opacity="0.6"/>
          <use href="#crater" x="170" y="85" width="5"  height="5"  opacity="0.5"/>
          <use href="#crater" x="128" y="84" width="6"  height="6"  opacity="0.55"/>
          <use href="#crater" x="100" y="55" width="6"  height="5"  opacity="0.55"/>
        </g>
        <g filter="url(#paintWobble)">
          <use href="#crater" x="86" y="92" width="15" height="14" opacity="0.78"/>
          <use href="#crater" x="91" y="97" width="6"  height="5"  opacity="0.7"/>
        </g>
        <g filter="url(#paintWobble)">
          <use href="#crater" x="120" y="120" width="20" height="18" opacity="0.85"/>
          <use href="#crater" x="138" y="155" width="12" height="11" opacity="0.7"/>
          <use href="#crater" x="158" y="138" width="8"  height="7"  opacity="0.6"/>
          <use href="#crater" x="40"  y="105" width="11" height="10" opacity="0.65"/>
          <use href="#crater" x="68"  y="138" width="7"  height="6"  opacity="0.5"/>
          <use href="#crater" x="78"  y="155" width="6"  height="5"  opacity="0.5"/>
        </g>
        <g filter="url(#softenAll)" opacity="0.55">
          <ellipse cx="125" cy="50"  rx="1.4" ry="1.2" fill="#161D40"/>
          <ellipse cx="148" cy="48"  rx="1.1" ry="1"   fill="#161D40"/>
          <ellipse cx="160" cy="60"  rx="1.2" ry="1"   fill="#161D40"/>
          <ellipse cx="142" cy="68"  rx="0.9" ry="0.8" fill="#161D40"/>
          <ellipse cx="125" cy="78"  rx="1.0" ry="0.9" fill="#161D40"/>
          <ellipse cx="165" cy="78"  rx="0.8" ry="0.7" fill="#161D40"/>
          <ellipse cx="155" cy="92"  rx="1.1" ry="1"   fill="#161D40"/>
          <ellipse cx="138" cy="98"  rx="0.9" ry="0.8" fill="#161D40"/>
          <ellipse cx="172" cy="92"  rx="0.8" ry="0.7" fill="#161D40"/>
          <ellipse cx="98"  cy="32"  rx="1.2" ry="1"   fill="#161D40"/>
          <ellipse cx="85"  cy="42"  rx="0.9" ry="0.8" fill="#161D40"/>
          <ellipse cx="108" cy="42"  rx="0.8" ry="0.7" fill="#161D40"/>
          <ellipse cx="78"  cy="58"  rx="1.0" ry="0.9" fill="#161D40"/>
          <ellipse cx="148" cy="135" rx="0.9" ry="0.8" fill="#161D40"/>
          <ellipse cx="155" cy="148" rx="1.0" ry="0.9" fill="#161D40"/>
          <ellipse cx="125" cy="158" rx="0.8" ry="0.7" fill="#161D40"/>
          <ellipse cx="32"  cy="78"  rx="0.9" ry="0.8" fill="#161D40"/>
          <ellipse cx="38"  cy="92"  rx="0.7" ry="0.6" fill="#161D40"/>
        </g>
        <circle cx="100" cy="100" r="100" fill="url(#terminator)"/>
        <circle cx="100" cy="100" r="100" fill="url(#vintagePatina)" style="mix-blend-mode:multiply" opacity="0.85"/>
        <rect x="0" y="0" width="200" height="200" filter="url(#brushPaper)" opacity="0.55" style="mix-blend-mode:multiply"/>
        <rect x="0" y="0" width="200" height="200" filter="url(#paperFine)" opacity="0.4"/>
        <ellipse cx="55" cy="50" rx="32" ry="24" fill="rgba(220,228,245,0.18)" filter="url(#softenAll)" style="mix-blend-mode:screen"/>
      </g>
      <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(15,12,30,0.6)" stroke-width="0.8" filter="url(#paintWobble)" opacity="0.7"/>
    </svg>
    <div class="orbit__shadow"></div>
  </div>
</div>
