<!-- Custom CSS (Tailwind CDN + inline styles above) -->

<style>
  /* Atmósfera de cielo nocturno */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 80% 0%, rgba(53,115,118,0.18), transparent 60%),
      radial-gradient(ellipse 100% 80% at 20% 100%, rgba(39,64,94,0.32), transparent 70%),
      linear-gradient(180deg, #23141D 0%, #1E1820 50%, #1A0F16 100%);
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.55;
    background-image:
      radial-gradient(1px 1px at 12% 18%, #E6FCFA 100%, transparent),
      radial-gradient(1px 1px at 22% 62%, #E6FCFA 100%, transparent),
      radial-gradient(1.5px 1.5px at 38% 8%, #F2EBD3 100%, transparent),
      radial-gradient(1px 1px at 47% 84%, #E6FCFA 100%, transparent),
      radial-gradient(1px 1px at 58% 24%, #E6FCFA 100%, transparent),
      radial-gradient(1.5px 1.5px at 71% 56%, #F2EBD3 100%, transparent),
      radial-gradient(1px 1px at 81% 12%, #E6FCFA 100%, transparent),
      radial-gradient(1px 1px at 92% 78%, #E6FCFA 100%, transparent),
      radial-gradient(1.5px 1.5px at 7% 88%, #F2EBD3 100%, transparent),
      radial-gradient(1px 1px at 64% 92%, #E6FCFA 100%, transparent);
    animation: twinkle 8s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0%   { opacity: 0.40; }
    50%  { opacity: 0.65; }
    100% { opacity: 0.45; }
  }
  ::selection { background: #357376; color: #E6FCFA; }

  /* Orbe luna */
  .orbit {
    position: fixed; top: 14%; right: 8%;
    width: clamp(110px, 14vw, 200px);
    height: clamp(110px, 14vw, 200px);
    z-index: 1; pointer-events: none;
    opacity: 0; transform: translate3d(0, 0, 0);
    will-change: transform, opacity;
    animation: orbit-rise 2.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    --phase: -110%;
  }
  .orbit__moon {
    position: relative; width: 100%; height: 100%;
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 0 50px rgba(138, 149, 201, 0.15), 0 0 100px rgba(89, 101, 160, 0.08);
    mix-blend-mode: screen; opacity: 0.78;
  }
  .orbit__svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; filter: blur(0.4px); }
  .orbit__shadow {
    position: absolute; inset: -2%; border-radius: 50%;
    background: radial-gradient(circle at center, #000 55%, rgba(0,0,0,0.78) 78%, rgba(0,0,0,0.0) 100%);
    transform: translate3d(var(--phase, -110%), 0, 0); will-change: transform;
    filter: blur(4.5px);
  }
  @keyframes orbit-rise {
    from { transform: translate3d(0, 40px, 0) scale(0.9); opacity: 0; }
    to   { transform: translate3d(0, 0, 0)    scale(1);   opacity: 1; }
  }
  @media (max-width: 759px) {
    .orbit { width: 78px; height: 78px; top: 5.5rem; right: 1rem; }
    .orbit__moon { opacity: 0.55; }
  }
  @media (max-width: 379px) {
    .orbit { width: 65px; height: 65px; top: 5rem; right: 0.85rem; }
  }

  /* Marquee */
  .marquee-track { display: inline-flex; gap: 3rem; animation: marquee 40s linear infinite; white-space: nowrap; }
  .marquee-track > span { display: inline-flex; align-items: center; gap: 3rem; }
  .marquee-track > span::after { content: "☾"; color: #357376; font-style: normal; }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(34px); transition: opacity 1s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  /* Rise on load */
  @keyframes rise { from { opacity: 0; transform: 'translateY(28px)'; } to { opacity: 1; transform: 'translateY(0)'; } }
  .rise { animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .rise-1 { animation-delay: 0.15s; }
  .rise-2 { animation-delay: 0.30s; }
  .rise-3 { animation-delay: 0.50s; }
  .rise-4 { animation-delay: 0.70s; }

  /* Pulse dot */
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(91, 217, 168, 0.55); }
    70%  { box-shadow: 0 0 0 12px rgba(91, 217, 168, 0); }
    100% { box-shadow: 0 0 0 0 rgba(91, 217, 168, 0); }
  }
  .pulse-dot { animation: pulse-dot 2.4s ease-in-out infinite; }
  .pulse-dot::after { content: ""; position: absolute; inset: -3px; border-radius: 50%; background: #5BD9A8; opacity: 0.25; filter: blur(3px); }

  /* Title star */
  .title-star::after { content: "✦"; display: inline-block; margin-left: 0.4rem; font-size: 0.35em; color: #357376; vertical-align: super; animation: star-pulse 3s ease-in-out infinite; }
  @keyframes star-pulse { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.15); } }

  /* Form inputs */
  .form-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(230, 252, 250, 0.14); padding: 0.85rem 0; color: #E6FCFA; font-family: 'Albert Sans', system-ui, sans-serif; font-size: 1.05rem; font-weight: 300; outline: none; border-radius: 0; -webkit-appearance: none; appearance: none; transition: border-color 0.4s ease, box-shadow 0.4s ease; }
  .form-input::placeholder { color: rgba(230, 252, 250, 0.45); font-style: italic; font-family: 'Cormorant Garamond', Georgia, serif; }
  .form-input:focus { border-bottom-color: #357376; box-shadow: 0 1px 0 0 #357376; }
  .form-input--ta { resize: vertical; min-height: 130px; line-height: 1.6; }
  .form-input--sel { cursor: pointer; padding-right: 2rem; }
  .form-input--sel option { background: #23141D; color: #E6FCFA; }
  @media (max-width: 759px) { .form-input { font-size: 16px; padding: 0.9rem 0; } }
  .form-input:focus-visible { outline: none; }

  /* Lane bullets */
  .lane-list li { display: grid; grid-template-columns: auto 1fr; gap: 0.85rem; align-items: baseline; }
  .lane-list li::before { content: "✧"; font-family: 'Italiana', serif; color: #357376; font-size: 0.9rem; }

  /* Editorial strong */
  .editorial-strong strong { font-weight: 500; color: #E6FCFA; font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-size: 1.06em; }
  .editorial-strong--lg strong { font-size: 1.08em; }

  /* Gradient text */
  .gradient-text-em { color: #357376; text-shadow: 0 0 30px rgba(53,115,118,0.4); }

  /* Mobile menu */
  body.menu-open { overflow: hidden; }
  .mobile-menu { opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; }
  .mobile-menu.is-open { opacity: 1; visibility: visible; }
  .mobile-menu__panel { opacity: 0; transform: translateY(20px) scale(0.97); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s; }
  .mobile-menu.is-open .mobile-menu__panel { opacity: 1; transform: translateY(0) scale(1); }

  /* Burger lines */
  .burger-line { position: absolute; left: 50%; width: 16px; height: 1px; background: #E6FCFA; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform: translateX(-50%); }
  .burger-line:nth-child(1) { top: 15px; }
  .burger-line:nth-child(2) { bottom: 15px; }
  .nav__burger.is-open .burger-line:nth-child(1) { top: 50%; transform: translate(-50%, -50%) rotate(45deg); }
  .nav__burger.is-open .burger-line:nth-child(2) { bottom: auto; top: 50%; transform: translate(-50%, -50%) rotate(-45deg); }

  /* Project hover */
  .project:hover .project-thumb { border-color: #357376; box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(53,115,118,0.35); }
  .project:hover .project-title { color: #357376; }

  /* Form success */
  .form__success { display: none; }
  .form__success.is-visible { display: block; }

  /* Back to top */
  .back-to-top { opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(15px); transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease; }
  .back-to-top.is-visible { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0); }

  /* Focus visible */
  :focus-visible { outline: 2px solid #357376; outline-offset: 3px; border-radius: 2px; }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
    body::after, .orbit, .marquee-track, .title-star::after, .pulse-dot { animation: none !important; }
  }

  /* Cursor custom */
  @media (hover: hover) and (pointer: fine) { body, body * { cursor: none !important; } input, textarea { cursor: text !important; } }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1A0F16; }
  ::-webkit-scrollbar-thumb { background: #357376; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #27405E; }
  @supports (scrollbar-width: thin) { * { scrollbar-width: thin; scrollbar-color: #357376 #1A0F16; } }
  .cursor-dot, .cursor-ring { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; will-change: transform; opacity: 0; }
  .cursor-dot.is-active, .cursor-ring.is-active { opacity: 1; }
  .cursor-dot { width: 6px; height: 6px; background: #E6FCFA; border-radius: 50%; transform: translate3d(-50%, -50%, 0); transition: opacity 0.3s ease, transform 0.15s ease, background 0.25s ease, width 0.25s ease, height 0.25s ease; box-shadow: 0 0 8px rgba(230, 252, 250, 0.4); }
  .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(53, 115, 118, 0.55); border-radius: 50%; background: rgba(53, 115, 118, 0.04); transform: translate3d(-50%, -50%, 0); transition: opacity 0.3s ease, width 0.35s cubic-bezier(0.16, 1, 0.3, 1), height 0.35s cubic-bezier(0.16, 1, 0.3, 1), background 0.35s ease, border-color 0.35s ease; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
  .cursor-ring.is-hovering { width: 56px; height: 56px; background: rgba(53, 115, 118, 0.18); border-color: rgba(91, 217, 168, 0.7); }
  .cursor-dot.is-hovering { width: 4px; height: 4px; background: #5BD9A8; }
  .cursor-ring.is-clicking { width: 24px; height: 24px; background: rgba(91, 217, 168, 0.25); }
  @media (hover: none), (pointer: coarse), (max-width: 759px) { .cursor-dot, .cursor-ring { display: none; } }
</style>
