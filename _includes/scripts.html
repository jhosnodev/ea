<!-- JAVASCRIPT -->
<script>
// Auto-detectar idioma del navegador
(function() {
  var savedLang = localStorage.getItem('preferred_lang');
  if (savedLang === 'en') return;
  var lang = navigator.language || navigator.userLanguage;
  if (lang && lang.toLowerCase().startsWith('en') && !sessionStorage.getItem('lang_redirect')) {
    localStorage.setItem('preferred_lang', 'en');
    sessionStorage.setItem('lang_redirect', '1');
    window.location.href = '/en/';
  }
})();

// Reveal on scroll
const reveals = document.querySelectorAll('.reveal');
const io = new IntersectionObserver((entries) => {
  entries.forEach((entry) => {
    if (entry.isIntersecting) {
      entry.target.classList.add('is-visible');
      io.unobserve(entry.target);
    }
  });
}, { threshold: 0.1 });
reveals.forEach(el => io.observe(el));

// Mobile menu
const burger = document.querySelector('.nav__burger');
const closeBtn = document.querySelector('.mobile-menu__close');
const mobileMenu = document.querySelector('.mobile-menu');
const mobileMenuLinks = document.querySelectorAll('.mobile-menu__link, .mobile-menu__cta');

function toggleMenu(forceOpen) {
  if (!burger || !mobileMenu) return;
  const isOpen = typeof forceOpen === 'boolean' ? forceOpen : !burger.classList.contains('is-open');
  burger.classList.toggle('is-open', isOpen);
  mobileMenu.classList.toggle('is-open', isOpen);
  burger.setAttribute('aria-expanded', String(isOpen));
  mobileMenu.setAttribute('aria-hidden', String(!isOpen));
  document.body.classList.toggle('menu-open', isOpen);
  burger.setAttribute('aria-label', isOpen ? 'Cerrar menú' : 'Abrir menú');
}

if (burger) burger.addEventListener('click', () => toggleMenu());
if (closeBtn) closeBtn.addEventListener('click', () => toggleMenu(false));
mobileMenuLinks.forEach(link => link.addEventListener('click', () => toggleMenu(false)));

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && mobileMenu && mobileMenu.classList.contains('is-open')) {
    toggleMenu(false);
  }
});

const desktopMQ = window.matchMedia('(min-width: 851px)');
desktopMQ.addEventListener('change', (e) => { if (e.matches) toggleMenu(false); });

// Scroll effects
const orbit = document.querySelector('.orbit');
const orbitShadow = document.querySelector('.orbit__shadow');
const heroEl = document.querySelector('.hero');
const heroMeta = document.querySelector('.hero__meta');
const heroTitle = document.querySelector('.hero__title');
const heroBottom = document.querySelector('.hero__bottom');
const backToTop = document.querySelector('.back-to-top');

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let heroParallaxReady = reducedMotion;
if (!reducedMotion) setTimeout(() => { heroParallaxReady = true; }, 2100);

let ticking = false;
function updateScrollFx() {
  const y = window.scrollY;
  const docH = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
  const progress = Math.min(Math.max(y / docH, 0), 1);

  if (orbitShadow) {
    const phase = -110 + (progress * 220);
    orbitShadow.style.transform = 'translate3d(' + phase.toFixed(2) + '%, 0, 0)';
  }

  if (orbit && !reducedMotion) {
    const parallaxY = y * 0.10;
    const fadeStart = 0.85;
    const fadeAlpha = progress > fadeStart ? Math.max(0, 1 - ((progress - fadeStart) / (1 - fadeStart))) : 1;
    orbit.style.transform = 'translate3d(0, ' + parallaxY.toFixed(2) + 'px, 0)';
    orbit.style.opacity = fadeAlpha.toFixed(3);
  }

  if (heroEl && heroParallaxReady && !reducedMotion) {
    const heroH = heroEl.offsetHeight || window.innerHeight;
    const heroProgress = Math.min(Math.max(y / heroH, 0), 1);
    if (heroMeta) heroMeta.style.transform = 'translate3d(0, ' + (y * 0.32).toFixed(2) + 'px, 0)';
    if (heroTitle) heroTitle.style.transform = 'translate3d(0, ' + (y * 0.14).toFixed(2) + 'px, 0)';
    if (heroBottom) heroBottom.style.transform = 'translate3d(0, ' + (y * 0.08).toFixed(2) + 'px, 0)';
    const heroAlpha = Math.max(0, 1 - heroProgress * 1.15);
    if (heroMeta) heroMeta.style.opacity = heroAlpha.toFixed(3);
    if (heroTitle) heroTitle.style.opacity = heroAlpha.toFixed(3);
    if (heroBottom) heroBottom.style.opacity = heroAlpha.toFixed(3);
  }

  if (backToTop) backToTop.classList.toggle('is-visible', y > 600);
  ticking = false;
}

function onScroll() {
  if (!ticking) {
    window.requestAnimationFrame(updateScrollFx);
    ticking = true;
  }
}
window.addEventListener('scroll', onScroll, { passive: true });
window.addEventListener('resize', onScroll, { passive: true });
updateScrollFx();

if (backToTop) {
  backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}

// Cursor custom
const hasFinePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
const cursorDot = document.querySelector('.cursor-dot');
const cursorRing = document.querySelector('.cursor-ring');

if (hasFinePointer && cursorDot && cursorRing) {
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let ringX = mouseX, ringY = mouseY;
  let firstMove = true;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursorDot.style.transform = 'translate3d(' + mouseX + 'px, ' + mouseY + 'px, 0) translate(-50%, -50%)';
    if (firstMove) {
      cursorDot.classList.add('is-active');
      cursorRing.classList.add('is-active');
      firstMove = false;
    }
  }, { passive: true });

  function animateRing() {
    ringX += (mouseX - ringX) * 0.18;
    ringY += (mouseY - ringY) * 0.18;
    cursorRing.style.transform = 'translate3d(' + ringX.toFixed(2) + 'px, ' + ringY.toFixed(2) + 'px, 0) translate(-50%, -50%)';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  const hoverSelector = 'a, button, [role="button"], .tag, .project, input[type="submit"], select, label';
  document.querySelectorAll(hoverSelector).forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursorRing.classList.add('is-hovering');
      cursorDot.classList.add('is-hovering');
    });
    el.addEventListener('mouseleave', () => {
      cursorRing.classList.remove('is-hovering');
      cursorDot.classList.remove('is-hovering');
    });
  });

  document.addEventListener('mousedown', () => cursorRing.classList.add('is-clicking'), { passive: true });
  document.addEventListener('mouseup', () => cursorRing.classList.remove('is-clicking'), { passive: true });
  document.addEventListener('mouseleave', () => {
    cursorDot.classList.remove('is-active');
    cursorRing.classList.remove('is-active');
  });
  document.addEventListener('mouseenter', () => {
    cursorDot.classList.add('is-active');
    cursorRing.classList.add('is-active');
  });
}

// Form submit
const form = document.getElementById('contact-form');
const successBox = document.getElementById('form-success');
if (form) {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    const submitBtn = form.querySelector('.form__submit');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = 'Enviando<span class="font-script italic text-lg ml-1">☾</span>';

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        form.style.display = 'none';
        successBox.classList.add('is-visible');
        successBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        const result = await response.json();
        alert(result.errors ? result.errors.map(err => err.message).join(', ') : 'Hubo un error. Escríbeme directo al correo.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    } catch (err) {
      alert('No pude enviar el mensaje. Escríbeme directo al correo de abajo.');
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
    }
  });
}
</script>
